services:
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - ALLOW_INTERNAL_REQUESTS=true
    volumes:
      - ./config:/config
      - .:/app
    ports:
      - "8081:80"
      - "8443:443"
    restart: unless-stopped