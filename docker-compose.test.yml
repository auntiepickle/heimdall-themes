# Side-by-side test of heimdall-themes image against the running `heimdall` container.
# Usage on the server (from repo root):
#
#   # 1. Build the image
#   docker compose -f docker-compose.test.yml build
#
#   # 2. Snapshot current /config so we don't touch the live one
#   sudo cp -a /home/piekel/server/configs/heimdall /home/piekel/server/configs/heimdall-test
#
#   # 3. Start test container (different name + ports)
#   docker compose -f docker-compose.test.yml up -d
#
#   # 4. Browse http://<server-ip>:7081  — live heimdall is still on :8081
#
#   # 5. If it all works, shut it down and cut over (see README-DEPLOY.md)
#   docker compose -f docker-compose.test.yml down
#
services:
  heimdall-test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: heimdall-themes:test
    container_name: heimdall-test
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - ALLOW_INTERNAL_REQUESTS=true
    volumes:
      - /home/piekel/server/configs/heimdall-test:/config
    ports:
      - "7081:80"
      - "7443:443"
    restart: "no"
