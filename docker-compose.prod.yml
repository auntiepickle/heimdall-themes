# Production compose for heimdall-themes.
# Drop-in replacement for the upstream linuxserver/heimdall compose.
# Ships themes + engine baked into the image; /config stays a user volume.
services:
  heimdall:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: heimdall-themes:latest
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - ALLOW_INTERNAL_REQUESTS=true
    volumes:
      - ./config:/config
    ports:
      - "8081:80"
      - "8443:443"
    restart: unless-stopped
