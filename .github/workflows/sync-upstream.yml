name: Sync upstream
on:
  schedule: [{cron: "0 9 * * 1"}]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0, token: "${{ secrets.GITHUB_TOKEN }}"}
      - name: Sync
        env: {GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/linuxserver/Heimdall.git || true
          git fetch upstream
          [ "$(git rev-parse upstream/master)" = "$(git merge-base HEAD upstream/master)" ] && { echo "Up to date"; exit 0; }
          BRANCH="sync/upstream-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git merge upstream/master --no-edit || true
          git push origin "$BRANCH"
          gh pr create --title "chore: sync upstream $(date +%Y-%m-%d)" --body "Check THEMES blocks in app.blade.php and routes/web.php." --base main --head "$BRANCH" || true